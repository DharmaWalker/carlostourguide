<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <radialGradient id="sphereGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5e6c0"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#8b6520"/>
    </radialGradient>
    <radialGradient id="sphereGloss" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b2020"/>
      <stop offset="50%" stop-color="#b52828"/>
      <stop offset="100%" stop-color="#6b1010"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="50%" stop-color="#d4a040"/>
      <stop offset="100%" stop-color="#a07020"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="100" cy="88" r="48"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════
       ESFERA ARMILAR
  ═══════════════════════════════ -->
  <g filter="url(#softShadow)">

    <!-- Globe base -->
    <circle cx="100" cy="88" r="48" fill="url(#sphereGrad)" stroke="#a07020" stroke-width="1.5"/>
    <circle cx="100" cy="88" r="48" fill="url(#sphereGloss)"/>

    <!-- Latitude lines (clipped to sphere) -->
    <g clip-path="url(#circleClip)" fill="none" stroke="#8b6520" stroke-width="0.8" stroke-opacity="0.6">
      <ellipse cx="100" cy="88" rx="48" ry="14"/>
      <ellipse cx="100" cy="88" rx="48" ry="28"/>
      <line x1="52" y1="88" x2="148" y2="88"/>
      <line x1="100" y1="40" x2="100" y2="136"/>
    </g>

    <!-- Armillary rings — outer band (meridian) -->
    <ellipse cx="100" cy="88" rx="56" ry="56" fill="none"
             stroke="url(#goldEdge)" stroke-width="5" stroke-opacity="0.9"/>
    <!-- Tilted ring -->
    <ellipse cx="100" cy="88" rx="54" ry="22" fill="none"
             stroke="url(#goldEdge)" stroke-width="4" stroke-opacity="0.85"
             transform="rotate(-20 100 88)"/>
    <!-- Second tilted ring -->
    <ellipse cx="100" cy="88" rx="54" ry="22" fill="none"
             stroke="url(#goldEdge)" stroke-width="4" stroke-opacity="0.7"
             transform="rotate(20 100 88)"/>
    <!-- Equatorial ring -->
    <ellipse cx="100" cy="88" rx="56" ry="18" fill="none"
             stroke="url(#goldEdge)" stroke-width="4.5" stroke-opacity="0.9"/>

    <!-- Vertical axis pole top/bottom -->
    <line x1="100" y1="30" x2="100" y2="146"
          stroke="url(#goldEdge)" stroke-width="3" stroke-linecap="round"/>

    <!-- Pole caps -->
    <circle cx="100" cy="31" r="4.5" fill="#d4a574" stroke="#8b6520" stroke-width="1"/>
    <circle cx="100" cy="145" r="4.5" fill="#d4a574" stroke="#8b6520" stroke-width="1"/>

    <!-- ═══════════════════════════════
         ESCUDO DE PORTUGAL (centro)
    ═══════════════════════════════ -->
    <!-- Shield background — verde -->
    <g transform="translate(82,72) scale(0.36)">
      <!-- Main green field -->
      <path d="M50,0 L100,20 L100,80 Q100,120 50,140 Q0,120 0,80 L0,20 Z"
            fill="#006600" stroke="#004400" stroke-width="2"/>
      <!-- White/silver border oval (simplified quinas frame) -->
      <ellipse cx="50" cy="70" rx="32" ry="38" fill="none"
               stroke="#f0f0e0" stroke-width="5"/>
      <!-- 5 blue quinas (simplified as small shields) -->
      <!-- Top -->
      <rect x="38" y="30" width="24" height="18" rx="3" fill="#00308F" stroke="#001a5e" stroke-width="1"/>
      <!-- Left -->
      <rect x="14" y="54" width="24" height="18" rx="3" fill="#00308F" stroke="#001a5e" stroke-width="1"/>
      <!-- Right -->
      <rect x="62" y="54" width="24" height="18" rx="3" fill="#00308F" stroke="#001a5e" stroke-width="1"/>
      <!-- Bottom-left -->
      <rect x="22" y="80" width="24" height="18" rx="3" fill="#00308F" stroke="#001a5e" stroke-width="1"/>
      <!-- Bottom-right -->
      <rect x="54" y="80" width="24" height="18" rx="3" fill="#00308F" stroke="#001a5e" stroke-width="1"/>
      <!-- White dots on each quina (simplified besants) -->
      <circle cx="44" cy="37" r="2.5" fill="#e8e0c0"/><circle cx="56" cy="37" r="2.5" fill="#e8e0c0"/>
      <circle cx="44" cy="44" r="2.5" fill="#e8e0c0"/><circle cx="56" cy="44" r="2.5" fill="#e8e0c0"/>
      <circle cx="20" cy="61" r="2.5" fill="#e8e0c0"/><circle cx="32" cy="61" r="2.5" fill="#e8e0c0"/>
      <circle cx="20" cy="68" r="2.5" fill="#e8e0c0"/><circle cx="32" cy="68" r="2.5" fill="#e8e0c0"/>
      <circle cx="68" cy="61" r="2.5" fill="#e8e0c0"/><circle cx="80" cy="61" r="2.5" fill="#e8e0c0"/>
      <circle cx="68" cy="68" r="2.5" fill="#e8e0c0"/><circle cx="80" cy="68" r="2.5" fill="#e8e0c0"/>
      <circle cx="28" cy="87" r="2.5" fill="#e8e0c0"/><circle cx="40" cy="87" r="2.5" fill="#e8e0c0"/>
      <circle cx="28" cy="94" r="2.5" fill="#e8e0c0"/><circle cx="40" cy="94" r="2.5" fill="#e8e0c0"/>
      <circle cx="60" cy="87" r="2.5" fill="#e8e0c0"/><circle cx="72" cy="87" r="2.5" fill="#e8e0c0"/>
      <circle cx="60" cy="94" r="2.5" fill="#e8e0c0"/><circle cx="72" cy="94" r="2.5" fill="#e8e0c0"/>
      <!-- Red border castles (simplified, 4 corners and 3 sides) -->
      <!-- Bottom red band with castles suggestion -->
      <path d="M4,100 Q4,128 50,140 Q96,128 96,100 Z" fill="#CC0000" stroke="#880000" stroke-width="1.5"/>
      <!-- 3 castle silhouettes on red band -->
      <rect x="22" y="104" width="14" height="10" rx="1" fill="#e8c060" stroke="#a07020" stroke-width="0.8"/>
      <rect x="43" y="104" width="14" height="10" rx="1" fill="#e8c060" stroke="#a07020" stroke-width="0.8"/>
      <rect x="64" y="104" width="14" height="10" rx="1" fill="#e8c060" stroke="#a07020" stroke-width="0.8"/>
      <!-- Castle battlements (merlons) -->
      <rect x="22" y="100" width="3" height="5" fill="#e8c060"/><rect x="27" y="100" width="3" height="5" fill="#e8c060"/><rect x="32" y="100" width="3" height="5" fill="#e8c060"/>
      <rect x="43" y="100" width="3" height="5" fill="#e8c060"/><rect x="48" y="100" width="3" height="5" fill="#e8c060"/><rect x="53" y="100" width="3" height="5" fill="#e8c060"/>
      <rect x="64" y="100" width="3" height="5" fill="#e8c060"/><rect x="69" y="100" width="3" height="5" fill="#e8c060"/><rect x="74" y="100" width="3" height="5" fill="#e8c060"/>
    </g>
  </g>

  <!-- ═══════════════════════════════
       FAIXA 'MADE IN PORTUGAL'
  ═══════════════════════════════ -->
  <!-- Ribbon background with curves -->
  <path d="M8,162 Q20,155 100,158 Q180,155 192,162 L188,178 Q176,185 100,182 Q24,185 12,178 Z"
        fill="url(#bandGrad)" stroke="#6b1010" stroke-width="1"/>
  <!-- Gold top edge line -->
  <path d="M10,162 Q20,156 100,159 Q180,156 190,162"
        fill="none" stroke="#d4a040" stroke-width="1.5" stroke-opacity="0.8"/>
  <!-- Gold bottom edge line -->
  <path d="M12,178 Q24,184 100,181 Q176,184 188,178"
        fill="none" stroke="#d4a040" stroke-width="1.5" stroke-opacity="0.8"/>

  <!-- Text on ribbon -->
  <text x="100" y="174"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13"
        font-weight="bold"
        letter-spacing="2.5"
        fill="#f5e6a0"
        text-anchor="middle"
        dominant-baseline="middle">MADE IN PORTUGAL</text>

  <!-- ═══════════════════════════════
       DECORATIVE ELEMENTS
  ═══════════════════════════════ -->
  <!-- Small stars/dots flanking shield -->
  <circle cx="60" cy="148" r="2.5" fill="#d4a574" opacity="0.7"/>
  <circle cx="140" cy="148" r="2.5" fill="#d4a574" opacity="0.7"/>
  <circle cx="52" cy="155" r="1.8" fill="#d4a574" opacity="0.5"/>
  <circle cx="148" cy="155" r="1.8" fill="#d4a574" opacity="0.5"/>

  <!-- Thin gold rule above ribbon -->
  <line x1="30" y1="156" x2="170" y2="156" stroke="#d4a040" stroke-width="0.8" stroke-opacity="0.5"/>
</svg>
